pipeline_id: cpac
display_name: C-PAC
aliases:
  - cpac
  - C-PAC
  - CPAC
  - "Configurable Pipeline for the Analysis of Connectomes"
  # Some papers write "Configurable Pipeline for Analysis of Connectomes" (no "the",
  # e.g. Vanderwal 2016). The parenthetical-acronym path in recognize() resolves
  # "...(C-PAC)" via the C-PAC alias, so that variant is covered without an explicit
  # alias; add one only if a test shows a paper omitting both "the" AND the acronym.
component_tools: []
notes: |
  Version timeline ONLY. param_defaults intentionally empty across all versions.
  Rationale: C-PAC is a configure-from-template pipeline shipping ~10 presets
  (default, ccs-options, fmriprep-options, abcd-options, ndmg, rbc-options, ...);
  a "default config" value is not a reliable stand-in for an unstated field, so no
  param defaults are asserted. Whether param defaults are worth encoding for any
  pipeline is deferred to external (NARPS) evidence on field pipeline/version usage.
  This doc exists so resolve_version() exercises the date_inferred_version path.

  Development versions (e.g. OConnor 2017's stated "C-PAC 0.4.0", which lived untagged
  between v0.3.9.1 and v1.0.0) have no release artifact and are intentionally NOT recorded;
  such versions cannot be date-resolved to a canonical release.

  Stable releases only (a/b/rc/.dev/.post excluded). Dates are git tag creatordate
  (v1.3.0 is a lightweight tag with no creatordate; its commit date 2018-10-10 is used).
