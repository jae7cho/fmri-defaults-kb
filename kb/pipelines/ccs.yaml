component_tools: []
notes: |
  CCS (Xu et al. 2015) has no formal release tags on github.com/zuoxinian/CCS
  (`git ls-remote --tags` returns zero). Versioning here is therefore NOT
  tag-based: the first record is paper-anchored to the canonical publication
  and the second is a commit checkpoint pinned by SHA + committer date.

  Five param_defaults are pinned per version. `surface_projection.target_surface`
  and `temporal_filtering.effective_band_hz` are DELIBERATELY OMITTED — Xu 2015
  documents both as user-configurable, with no single CCS default:

  - target_surface: §3.3 step 8 projects onto the fsaverage grid and
    down-samples to fsaverage5 (group) OR to MNI152 volumetric space; the
    surface-vs-volume / native-vs-group choice is analysis-style-dependent.
  - effective_band_hz: §3.3 states "temporal filtering is usually performed
    for functional connectivity analyses but is not necessary for analyses in
    the frequency domain ... The CCS leaves the user to decide." There is no
    intrinsic CCS filtering band, so no step and no default is encoded (same
    firewall discipline as HCP-minimal omitting its filtering contribution).

  Filling either field would fabricate a default the pipeline does not impose.

  Spec-encoding note for target_space: Xu 2015 names "MNI152 standard
  volumetric space" generically. CCS performs spatial normalization with FSL
  FLIRT/FNIRT (§3.1), whose standard MNI152 template is the 6th-generation
  nonlinear asymmetric template — encoded against the agent spec's TargetSpace
  literal as `MNI152NLin6Asym` (the same FSL template HCP minimal targets).
  The paper string is "MNI152"; `MNI152` is not a member of the spec literal,
  so the FSL-template-faithful member is used. This makes CCS and HCP v3.4.0
  share target_space + surface_registration + intensity convention; the
  cross-pipeline keying distinction is `resolution_mm` (CCS 3 mm vs HCP 2 mm).

versions:
  - version: "2015"
    version_kind: paper_anchored
    release_date: "2015-01-05"
    release_source: "https://doi.org/10.1007/s11434-014-0698-3"
    notes: |
      Anchored to the canonical publication (Xu et al. 2015, "A Connectome
      Computation System for discovery science of brain", Sci. Bull. 60(1):
      86–95, published online 2015-01-05) describing the pipeline at release.
      All defaults below sourced from Xu 2015 §3 "Image preprocessing"
      (§3.1 sMRI, §3.3 rfMRI), all on printed page 89.
    param_defaults:
      spatial_normalization.target_space:
        value: "MNI152NLin6Asym"
        proposed_confidence: 0.9
        source: "Xu 2015 §3.3 (p. 89, rfMRI step 8) — '... or to the MNI152 standard volumetric space (spatial resolution = 3 mm)'; spatial normalization via FSL FLIRT/FNIRT per §3.1 (p. 89)."
        notes: "Paper says 'MNI152' generically; encoded as the FSL standard MNI152 6th-gen nonlinear asymmetric template (MNI152NLin6Asym), since CCS normalizes with FLIRT/FNIRT. confidence 0.9 (< the 0.95 of verbatim-quoted fields) reflects the template-disambiguation step."
      spatial_normalization.resolution_mm:
        value: 3
        proposed_confidence: 0.95
        source: "Xu 2015 §3.3 (p. 89, rfMRI step 8) — '... the MNI152 standard volumetric space (spatial resolution = 3 mm)'."
      surface_projection.surface_registration:
        value: "freesurfer_recon"
        proposed_confidence: 0.95
        source: "Operation: Xu 2015 §3.1 (p. 89, sMRI steps 10–11) — folding-based registration: '(10) individual surface mesh inflation into a sphere; and (11) individual surface (volume) normalization ... that aligned the cortical folding patterns (image density similarities) across subjects'. Tool (code-verified): CCS implements this via FreeSurfer recon-all — H1/ccs_anat_02_freesurfer.sh runs `recon-all -autorecon2 -autorecon3` (the FreeSurfer surface-reconstruction + spherical-registration stage, producing ?h.sphere.reg). recon-all is CCS's sole surface-registration engine — no MSM or alternative registration engine exists (caret/workbench appear only in the optional fsLR grid-resampling path, downstream of and keyed on sphere.reg). Code confirmed at repo master 9a1fc10 (2024-09-12); CCS is untagged, so no processing-version tag exists — the 2015 provenance is paper-anchored (Xu 2015) and temporally consistent with chen 2015, which states no CCS version."
        notes: "Spec enum 'freesurfer_recon' = the FreeSurfer recon-all reconstruction/spherical-registration path, code-verified as CCS's sole surface-registration engine (caret/workbench in the fsLR path do grid resampling only). 0.95 reflects code-verified pipeline composition (not lineage inference). CAVEAT: recon-all verified at current master (9a1fc10, 2024); CCS is untagged and chen 2015 states no CCS commit, so the exact 2015-era processing revision is not pinnable — corroborated by Xu 2015 §3.1's step description matching recon-all autorecon2/3."
      intensity_normalization.convention:
        value: "fsl_grand_mean_10000"
        proposed_confidence: 0.95
        source: "Xu 2015 §3.3 (p. 89, rfMRI step 4) — 'normalizing the 4D global mean of image intensity to 10,000'; 4D global (grand) mean, NOT mode/median."
      intensity_normalization.value:
        value: 10000
        proposed_confidence: 0.95
        source: "Xu 2015 §3.3 (p. 89, rfMRI step 4) — 'normalizing the 4D global mean of image intensity to 10,000'."
      # DELIBERATELY OMITTED — Xu 2015 documents these as user-configurable, no single CCS default:
      #   surface_projection.target_surface  — §3.3 step 8: fsaverage5 (group) vs MNI volume is analysis-style-dependent
      #   temporal_filtering.effective_band_hz — §3.3: "The CCS leaves the user to decide"; no intrinsic filtering step

