pipeline_id: fmriprep
display_name: fMRIPrep
aliases:
  - fmriprep
  - fMRIPrep
  - "fMRIPrep (Esteban et al.)"
  - fmri-prep
  - fmri prep
component_tools: []
notes: |
  Version timeline for this build, PLUS one hand-authored param_default:
  surface_projection.surface_registration (a target_surface-conditional, the
  first production use of the B1 conditional machinery). Everything else --
  fMRIPrep's full per-flag inventory -- remains intentionally empty here and is
  deferred to the Sub-A auto-parsed kb/tools/fmriprep/{version}.yaml path (unbuilt,
  unwired). surface_registration is carved out because it is a hand-derived
  conditional with a version boundary, which the argparse-oriented Sub-A auto-parser
  does not emit, and because the working route get_param_defaults() actually reads is
  pipelines/*.yaml param_defaults (as in ccs.yaml / hcp_minimal.yaml).

  Boundary basis (code/changelog-verified, DERIVED, ceiling 0.70), keyed on the
  paper's EXTRACTED surface_projection.target_surface:
    - native / fsaverage / fsaverage5 / fsaverage6 -> freesurfer_recon at ALL versions.
    - fsLR_32k -> freesurfer_recon for version < 23.2.0, msm_sulc for >= 23.2.0
      (nipreps/fmriprep CHANGES.rst 23.2.0, 2024-01-10; PR #3085: MSM-Sulc "enabled by
      default", --no-msm to disable). The boundary is by VERSION (>= 23.2.0), not date.
  fsLR_164k is intentionally omitted: fMRIPrep emits fsLR densities 10k/32k/41k and CIFTI
  grayordinates 91k (32k mesh) / 170k (59k mesh) -- there is no 164k output, so only
  fsLR_32k maps to a TargetSurface literal (source: resampling.py density=10k/32k/41k;
  config.py + cli/parser.py --cifti-output choices 91k/170k). target_space / resolution_mm
  are CLI (--output-spaces) and stay paper-extracted, not defaulted here.

  This document also lets resolve_version() exercise against a dense, public release
  timeline (date_inferred_version path). Stable releases only (rc/alpha/beta/post
  excluded). Dates from github.com/nipreps/fmriprep release tags.

versions:
  - version: "1.0.0"
    release_date: "2017-12-07"
    release_source: "https://github.com/nipreps/fmriprep/releases/tag/1.0.0"
    param_defaults:
      # First use of the B1 target_surface-conditional machinery. surface_registration is
      # DERIVED from the paper's extracted surface_projection.target_surface (ceiling 0.70).
      surface_projection.surface_registration:
        value:
          conditional_on: surface_projection.target_surface
          rules:
            - when: [native, fsaverage, fsaverage5, fsaverage6]
              value: freesurfer_recon
              proposed_confidence: 0.70
              source: "fMRIPrep aligns FreeSurfer surface targets (native/fsaverage*) via recon-all folding-based spherical registration at all versions; MSM applies only to fsLR. Enum 'freesurfer_recon' = the FreeSurfer-reconstruction-driven registration path."
            - when: [fsLR_32k]
              value: freesurfer_recon
              proposed_confidence: 0.65
              source: "Before fMRIPrep 23.2.0, fsLR alignment (91k grayordinate / 32k mesh) used FreeSurfer folding-based registration (no MSM); MSM-Sulc became the default only at 23.2.0 (nipreps/fmriprep CHANGES.rst 23.2.0, 2024-01-10; PR #3085), so pre-23.2.0 -> freesurfer_recon."
